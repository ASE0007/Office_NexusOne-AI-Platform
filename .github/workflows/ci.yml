name: NexusOne CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend Tests (Django)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexusone_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements/base.txt') }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt

      - name: Run migrations
        working-directory: backend
        env:
          DEBUG: "True"
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexusone_test
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py migrate

      - name: Run test suite
        working-directory: backend
        env:
          DEBUG: "True"
          SECRET_KEY: ci-test-secret-key-not-for-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/nexusone_test
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost,127.0.0.1"
        run: python manage.py test tests --verbosity=2

      - name: Run flake8 lint
        working-directory: backend
        run: |
          pip install flake8
          flake8 apps --max-line-length=120 --extend-ignore=E501,E203,W503 --exit-zero

  frontend-build:
    name: Frontend Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build production bundle
        # Note: this step fetches Inter from Google Fonts at build time via
        # next/font/google. If your CI runner has no internet egress, either
        # allow fonts.googleapis.com/fonts.gstatic.com or switch layout.tsx
        # to next/font/local with a self-hosted font file.
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pip-audit
        working-directory: backend
        run: |
          pip install pip-audit
          pip-audit -r requirements/base.txt --skip-editable || true

      - name: Run npm audit
        working-directory: frontend
        run: npm audit --audit-level=high || true
